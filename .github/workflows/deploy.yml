name: Deploy Typori to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site for publishing
        run: |
          mkdir -p public
          cp index.html      public/index.html
          cp display.html    public/display.html
          cp print.html      public/print.html
          cp syllabic.html   public/syllabic.html
          cp -r js           public/js
          cp -r css          public/css         || true
          cp -r templates    public/templates
          cp -r questions    public/questions
          # Copy font files if present
          cp *.ttf *.otf *.woff *.woff2 public/ 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
